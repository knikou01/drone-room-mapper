[project]
name = "drone-room-mapper"
version = "0.1.0"
description = "Simulation tool for drone with DimOS mapping a room"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "dimos[base,drone] @ git+https://github.com/dimensionalOS/dimos.git"
]

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.targets.wheel]
packages = ["rooms", "simulation", "blueprints"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
